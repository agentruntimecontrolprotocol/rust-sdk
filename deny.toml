# cargo-deny configuration for the arcp crate.
# Run via: cargo deny check

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Library MUST NOT pull in anyhow/eyre per build prompt rules.
    # (lazy_static is pulled in transitively by tracing-subscriber and is
    #  unavoidable; the "no direct use" policy is enforced by code review,
    #  see PLAN.md §A6.)
    { name = "anyhow" },
    { name = "eyre" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
